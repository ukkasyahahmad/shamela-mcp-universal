name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - run: npm ci
      - run: npm run test:unit
      - run: npm run build
      - run: npm run release:stage

      - id: meta
        shell: bash
        run: |
          VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF_TYPE}" = "tag" ] && [ "${GITHUB_REF_NAME}" != "${TAG}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${TAG}" >&2
            exit 1
          fi
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            TAG_SHA="$(git rev-list -n 1 "${TAG}")"
            echo "tag_sha=${TAG_SHA}" >> "$GITHUB_OUTPUT"
            if [ "${TAG_SHA}" != "${GITHUB_SHA}" ]; then
              echo "Existing tag ${TAG} points to ${TAG_SHA}, not ${GITHUB_SHA}" >&2
              exit 1
            fi
          else
            echo "tag_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - shell: bash
        run: |
          cd release
          zip -r "../shamela-mcp-${{ steps.meta.outputs.version }}.zip" shamela-mcp

      - run: npm pack

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release view "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1 && EXISTS=1 || EXISTS=0
          if [ "$EXISTS" -eq 1 ]; then
            gh release upload "${{ steps.meta.outputs.tag }}" \
              "shamela-mcp-${{ steps.meta.outputs.version }}.zip" \
              "shamela-mcp-${{ steps.meta.outputs.version }}.tgz" \
              --clobber
          else
            gh release create "${{ steps.meta.outputs.tag }}" \
              "shamela-mcp-${{ steps.meta.outputs.version }}.zip" \
              "shamela-mcp-${{ steps.meta.outputs.version }}.tgz" \
              --target "${{ steps.meta.outputs.tag_sha }}" \
              --title "${{ steps.meta.outputs.tag }}" \
              --generate-notes
          fi
